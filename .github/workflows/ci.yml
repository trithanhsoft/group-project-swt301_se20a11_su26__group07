name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Database Connection Check
        run: |
          cd backend
          # Use mock or dummy DATABASE_URL to verify scripts load without crashing
          DATABASE_URL=postgresql://postgres:password@localhost:5432/postgres JWT_SECRET=dummysecret node -e "import('../src/config/env.js').then(() => console.log('Env loaded successfully'))"

      - name: Run Vitest Unit Tests
        run: |
          cd backend
          npm test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter
        run: |
          cd frontend
          npm run lint

      - name: Run Build
        run: |
          cd frontend
          npm run build
