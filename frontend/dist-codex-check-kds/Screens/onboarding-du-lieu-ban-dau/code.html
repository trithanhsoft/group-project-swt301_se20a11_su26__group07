<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .option-card-radio:checked + div {
            border-color: theme('colors.primary');
            background-color: theme('colors.primary-fixed');
            box-shadow: 0 4px 6px -1px rgba(111, 78, 55, 0.1), 0 2px 4px -1px rgba(111, 78, 55, 0.06);
        }
        .option-card-radio:checked + div .material-symbols-outlined.check-icon {
            opacity: 1;
            transform: scale(1);
        }
        .option-card-radio:checked + div .icon-container {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-md lg:p-margin-desktop font-body-md text-body-md">
<!-- Suppressed TopNavBar & SideNavBar per Semantic Shell Mandate (Transactional Onboarding Screen) -->
<main class="w-full max-w-[800px] mx-auto bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 overflow-hidden flex flex-col min-h-[600px]">
<!-- Header Section -->
<div class="px-xl py-lg border-b border-surface-variant flex flex-col items-center text-center bg-surface-container-low">
<div class="mb-sm">
<span class="inline-block px-md py-xs bg-surface-variant text-on-surface-variant font-label-sm text-label-sm rounded-full tracking-wide">
                    Bước 2 của 3
                </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-background mb-xs">
                Dữ liệu ban đầu
            </h1>
<p class="font-body-md text-body-md text-secondary max-w-[500px]">
                Chọn cách bạn muốn thiết lập hệ thống. Bạn luôn có thể thay đổi và cập nhật thêm dữ liệu sau này.
            </p>
</div>
<!-- Content Section -->
<div class="flex-grow p-xl bg-surface-container-lowest">
<div class="grid grid-cols-1 md:grid-cols-3 gap-md">
<!-- Option 1: Sample Data -->
<label class="cursor-pointer group relative">
<input checked="" class="peer sr-only option-card-radio" name="data_setup_option" type="radio" value="sample"/>
<div class="h-full border-2 border-outline-variant rounded-lg p-lg flex flex-col transition-all duration-200 hover:border-primary/50 hover:bg-surface-container hover:shadow-md bg-surface-container-lowest">
<div class="flex justify-between items-start mb-md">
<div class="w-[48px] h-[48px] rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center icon-container transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="storefront" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<div class="w-[24px] h-[24px] rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors duration-200 peer-checked:border-primary bg-surface-container-lowest peer-checked:bg-primary">
<span class="material-symbols-outlined text-[16px] text-on-primary opacity-0 scale-0 transition-all duration-200 check-icon font-bold" data-icon="check">check</span>
</div>
</div>
<h3 class="font-headline-md text-[18px] leading-snug text-on-background mb-sm">
                            Sử dụng dữ liệu mẫu
                        </h3>
<p class="font-body-sm text-body-sm text-secondary flex-grow">
                            Tự động thêm các sản phẩm phổ biến như Cà phê sữa, Cà phê đen, Hạt cà phê, Sữa, Đường. Thích hợp để khám phá hệ thống.
                        </p>
</div>
</label>
<!-- Option 2: Excel Import -->
<label class="cursor-pointer group relative">
<input class="peer sr-only option-card-radio" name="data_setup_option" type="radio" value="excel"/>
<div class="h-full border-2 border-outline-variant rounded-lg p-lg flex flex-col transition-all duration-200 hover:border-primary/50 hover:bg-surface-container hover:shadow-md bg-surface-container-lowest">
<div class="flex justify-between items-start mb-md">
<div class="w-[48px] h-[48px] rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center icon-container transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="upload_file" style="font-variation-settings: 'FILL' 1;">upload_file</span>
</div>
<div class="w-[24px] h-[24px] rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors duration-200 peer-checked:border-primary bg-surface-container-lowest peer-checked:bg-primary">
<span class="material-symbols-outlined text-[16px] text-on-primary opacity-0 scale-0 transition-all duration-200 check-icon font-bold" data-icon="check">check</span>
</div>
</div>
<h3 class="font-headline-md text-[18px] leading-snug text-on-background mb-sm">
                            Nhập dữ liệu từ Excel
                        </h3>
<p class="font-body-sm text-body-sm text-secondary flex-grow">
                            Tải tệp mẫu và nhập danh sách sản phẩm của bạn. Nhanh chóng thiết lập nếu bạn đã có sẵn dữ liệu.
                        </p>
</div>
</label>
<!-- Option 3: Blank Canvas -->
<label class="cursor-pointer group relative">
<input class="peer sr-only option-card-radio" name="data_setup_option" type="radio" value="blank"/>
<div class="h-full border-2 border-outline-variant rounded-lg p-lg flex flex-col transition-all duration-200 hover:border-primary/50 hover:bg-surface-container hover:shadow-md bg-surface-container-lowest">
<div class="flex justify-between items-start mb-md">
<div class="w-[48px] h-[48px] rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center icon-container transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="note_add" style="font-variation-settings: 'FILL' 1;">note_add</span>
</div>
<div class="w-[24px] h-[24px] rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors duration-200 peer-checked:border-primary bg-surface-container-lowest peer-checked:bg-primary">
<span class="material-symbols-outlined text-[16px] text-on-primary opacity-0 scale-0 transition-all duration-200 check-icon font-bold" data-icon="check">check</span>
</div>
</div>
<h3 class="font-headline-md text-[18px] leading-snug text-on-background mb-sm">
                            Bắt đầu từ trang trống
                        </h3>
<p class="font-body-sm text-body-sm text-secondary flex-grow">
                            Tự thiết lập menu và kho hàng sau. Bắt đầu với một không gian làm việc hoàn toàn trống trải.
                        </p>
</div>
</label>
</div>
</div>
<!-- Footer Actions Section -->
<div class="px-xl py-lg border-t border-surface-variant bg-surface-container-lowest flex items-center justify-between mt-auto">

<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
                Quay lại
            </button>
<button class="px-lg py-[12px] rounded bg-primary-container text-on-primary font-label-md text-label-md hover:bg-primary transition-colors duration-150 shadow-sm hover:shadow flex items-center gap-sm" type="button">
                Tiếp tục
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<script>
        // Simple script to handle visual updates if needed beyond CSS peer targeting, 
        // though CSS handles the primary visual state switches elegantly.
        const radioButtons = document.querySelectorAll('.option-card-radio');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove check visual from all
                document.querySelectorAll('.check-icon').forEach(icon => {
                    icon.classList.remove('opacity-100', 'scale-100');
                    icon.classList.add('opacity-0', 'scale-0');
                });
                document.querySelectorAll('.check-icon').forEach(icon => {
                    let parent = icon.parentElement;
                    parent.classList.remove('border-primary', 'bg-primary');
                    parent.classList.add('border-outline-variant', 'bg-surface-container-lowest');
                });
                
                // Add check visual to selected (handled by CSS peer:checked, but JS backup ensures sync if DOM manipulated)
                if(e.target.checked) {
                     let containerDiv = e.target.nextElementSibling;
                     let checkContainer = containerDiv.querySelector('.check-icon').parentElement;
                     checkContainer.classList.add('border-primary', 'bg-primary');
                     checkContainer.classList.remove('border-outline-variant', 'bg-surface-container-lowest');
                     
                     let checkIcon = containerDiv.querySelector('.check-icon');
                     checkIcon.classList.remove('opacity-0', 'scale-0');
                     checkIcon.classList.add('opacity-100', 'scale-100');
                }
            });
        });
    </script>
</body></html>
