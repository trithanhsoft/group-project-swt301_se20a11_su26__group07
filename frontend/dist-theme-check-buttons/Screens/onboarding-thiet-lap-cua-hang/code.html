<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CoffeePOS - Onboarding: Business Info Setup</title>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-font-smoothing: antialiased;
        }
        .input-field {
            @apply w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-4 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200;
        }
        .input-label {
            @apply block font-label-md text-label-md text-on-surface-variant mb-sm;
        }
        .helper-text {
            @apply font-body-sm text-body-sm text-secondary mt-xs;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md lg:p-lg">
<main class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-[0_8px_16px_rgba(0,0,0,0.08)] border border-outline-variant p-lg md:p-xl relative overflow-hidden">
<!-- Decorative Header Background -->
<div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary-container to-primary"></div>
<div class="mb-xl text-center">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">Thiết lập cửa hàng</h1>
<p class="font-body-lg text-body-lg text-secondary">Hãy cho chúng tôi biết về doanh nghiệp của bạn</p>
</div>
<!-- Progress Indicator -->
<div class="mb-xl">
<div class="flex justify-between items-center mb-sm">
<span class="font-label-md text-label-md text-primary">Bước 1 của 3</span>
<span class="font-label-sm text-label-sm text-secondary">Thông tin doanh nghiệp</span>
</div>
<div class="w-full bg-surface-variant rounded-full h-2">
<div class="bg-primary h-2 rounded-full" style="width: 33.33%"></div>
</div>
</div>
<form class="space-y-lg">
<!-- Store Name -->
<div>
<label class="input-label" for="storeName">
                    Tên cửa hàng <span class="text-error">*</span>
</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-xl">storefront</span>
</span>
<input class="input-field pl-10" id="storeName" name="storeName" placeholder="VD: The Coffee House" required="" type="text"/>
</div>
<p class="helper-text">Tên này sẽ hiển thị trên biên lai của khách hàng.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Business Type -->
<div>
<label class="input-label" for="businessType">Loại hình kinh doanh</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-xl">category</span>
</span>
<select class="input-field pl-10 appearance-none" id="businessType" name="businessType">
<option value="coffee_shop">Quán Cà phê</option>
<option value="restaurant">Nhà hàng</option>
<option value="retail">Bán lẻ</option>
<option value="other">Khác</option>
</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-secondary">
<span class="material-symbols-outlined text-xl">arrow_drop_down</span>
</span>
</div>
</div>
<!-- Currency -->
<div>
<label class="input-label" for="currency">Loại tiền tệ</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-xl">payments</span>
</span>
<select class="input-field pl-10 appearance-none" id="currency" name="currency">
<option selected="" value="VND">VND (Việt Nam Đồng)</option>
<option value="USD">USD (Đô la Mỹ)</option>
</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-secondary">
<span class="material-symbols-outlined text-xl">arrow_drop_down</span>
</span>
</div>
</div>
</div>
<!-- Address -->
<div>
<label class="input-label" for="address">Địa chỉ</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary pt-3 items-start">
<span class="material-symbols-outlined text-xl">location_on</span>
</span>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 pl-10 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 resize-none" id="address" name="address" placeholder="Nhập địa chỉ chi tiết" rows="2"></textarea>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Phone Number -->
<div>
<label class="input-label" for="phone">Số điện thoại</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-xl">call</span>
</span>
<input class="input-field pl-10" id="phone" name="phone" placeholder="VD: 090 123 4567" type="tel"/>
</div>
</div>
</div>
<!-- Short Description -->
<div>
<label class="input-label" for="description">Mô tả ngắn</label>
<div class="relative">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 resize-none" id="description" name="description" placeholder="Một vài dòng giới thiệu về cửa hàng của bạn..." rows="3"></textarea>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-between items-center pt-md border-t border-outline-variant mt-xl">
<button class="px-lg py-3 rounded-lg bg-surface-container-lowest border border-outline-variant text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant transition-colors duration-200 flex items-center gap-sm" type="button">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
                    Quay lại
                </button>
<button class="px-lg py-3 rounded-lg bg-primary-container text-on-primary font-label-md text-label-md hover:opacity-90 transition-opacity duration-200 shadow-sm flex items-center gap-sm active:scale-95" type="submit">
                    Tiếp tục
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</main>
<script>
        // Simple micro-interaction for form focus
        document.querySelectorAll('.input-field, textarea').forEach(element => {
            element.addEventListener('focus', function() {
                this.closest('div').classList.add('transform', 'scale-[1.01]', 'transition-transform');
            });
            element.addEventListener('blur', function() {
                this.closest('div').classList.remove('transform', 'scale-[1.01]', 'transition-transform');
            });
        });
    </script>
</body></html>
