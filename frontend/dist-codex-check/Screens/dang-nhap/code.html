<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-md font-body-md text-on-surface antialiased">
<!-- Centered Login Card -->
<main class="w-full max-w-[1024px] flex flex-col md:flex-row bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] overflow-hidden min-h-[600px]">
<!-- Left Panel: Product Intro -->
<section class="w-full md:w-5/12 bg-primary relative flex flex-col justify-between p-xl lg:p-2xl overflow-hidden group">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0">
<img alt="Coffee background" class="w-full h-full object-cover opacity-30 mix-blend-multiply transition-transform duration-700 group-hover:scale-105" data-alt="A warm, inviting, top-down view of a modern coffee shop counter featuring professional espresso equipment, fresh coffee beans, and subtle barista tools. The scene is softly lit with warm amber tones and rich brown shadows, reflecting a professional retail environment. The aesthetic is clean, corporate modern, and highly organized, conveying a sense of efficiency and premium quality perfect for a modern POS system background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwN3ZWcQlFdkAXV6ZRiUiSSQdPXB3siwMd1kFBTkSCjK127o5BGFBVpB3genZ9sgt9mq5nC0GolVisWdyX6Fj9EKk45LYle2u4zDrqVmAfv1zAHLhE4esU7rEQpb5ooVf-fPUgUtfyjNWBUqpYFrJej7830HZJBtRxZeU7hnR409Ze2etrHlMgKIfO1jpQ5z2EWoubOO03FPMAEJj1vv_mQgxJJ9IJZPKUF2gAtEFzj7eRBHxQNQ6WkJ1bD6C3TehkbJaExjM9DF8"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary via-primary/80 to-primary/40"></div>
</div>
<!-- Content -->
<div class="relative z-10 flex flex-col h-full">
<!-- Branding Header -->
<div class="flex items-center gap-sm text-on-primary mb-2xl">
<span class="material-symbols-outlined" data-icon="point_of_sale" style="font-variation-settings: 'FILL' 1;">point_of_sale</span>
<span class="font-headline-md text-headline-md tracking-tight">CoffeePOS</span>
</div>
<div class="mt-auto">
<h1 class="font-headline-lg text-headline-lg text-on-primary mb-md">
                        Coffee POS Workspace
                    </h1>
<p class="font-body-md text-body-md text-primary-container opacity-90 max-w-sm">
                        Giải pháp quản lý bán hàng và kho chuyên nghiệp cho quán cà phê
                    </p>
</div>
</div>
</section>
<!-- Right Panel: Login Form -->
<section class="w-full md:w-7/12 p-xl lg:p-2xl flex flex-col justify-center bg-surface-container-lowest">
<div class="max-w-md w-full mx-auto">
<div class="mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Đăng nhập</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Vui lòng nhập thông tin để truy cập hệ thống.</p>
</div>
<!-- Validation Error Area -->
<div class="mb-lg bg-error-container/50 border border-error-container p-md rounded flex items-start gap-sm">
<span class="material-symbols-outlined text-error mt-0.5" data-icon="error">error</span>
<p class="font-body-sm text-body-sm text-on-error-container">
                        Tên đăng nhập hoặc mật khẩu không chính xác
                    </p>
</div>
<form action="#" class="space-y-lg" method="POST">
<!-- Email / Username Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="username">
                            Email hoặc tên đăng nhập
                        </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-md text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full h-[48px] pl-[44px] pr-md rounded border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md bg-surface-container-lowest text-on-surface" id="username" name="username" placeholder="Nhập email hoặc tên đăng nhập" type="text" value="admin@coffeepos.vn"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="password">
                            Mật khẩu
                        </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-md text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full h-[48px] pl-[44px] pr-md rounded border border-error focus:border-error focus:ring-1 focus:ring-error outline-none transition-colors font-body-md text-body-md bg-surface-container-lowest text-on-surface" id="password" name="password" placeholder="Nhập mật khẩu" type="password" value="********"/>
</div>
</div>
<!-- Features: Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer" type="checkbox"/>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">
                                Ghi nhớ đăng nhập
                            </span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">
                            Quên mật khẩu
                        </a>
</div>
<!-- Actions -->
<div class="pt-md space-y-md">
<button class="w-full h-[48px] bg-primary-container text-[#ffffff] font-label-md text-label-md rounded flex items-center justify-center hover:bg-surface-tint transition-all active:scale-[0.98] shadow-sm" type="button">
                            Đăng nhập
                        </button>
<button class="w-full h-[48px] bg-surface-container-lowest border border-outline-variant text-on-surface-variant font-label-md text-label-md rounded flex items-center justify-center hover:bg-surface-container transition-all active:scale-[0.98]" type="button">
                            Đăng ký tài khoản mới
                        </button>
</div>
</form>
</div>
</section>
