<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký tài khoản nhân viên - CoffeePOS</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Be Vietnam Pro -->
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#5c5f60",
                    "tertiary-container": "#006242",
                    "tertiary": "#00482f",
                    "surface": "#f9f9ff",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#d9e3f7",
                    "secondary-fixed": "#e1e2e4",
                    "surface-container": "#e6eeff",
                    "surface-bright": "#f9f9ff",
                    "outline-variant": "#d4c3ba",
                    "surface-dim": "#d0daef",
                    "on-primary-fixed-variant": "#5f402a",
                    "on-surface-variant": "#50453e",
                    "outline": "#82746d",
                    "inverse-primary": "#eabda0",
                    "tertiary-fixed-dim": "#4edea3",
                    "on-secondary-container": "#606365",
                    "on-secondary-fixed-variant": "#444749",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#2d1604",
                    "inverse-surface": "#273140",
                    "on-secondary": "#ffffff",
                    "on-surface": "#121c2a",
                    "primary-container": "#6f4e37",
                    "surface-container-low": "#eff3ff",
                    "surface-container-highest": "#d9e3f7",
                    "inverse-on-surface": "#ebf1ff",
                    "on-tertiary-fixed": "#002113",
                    "on-secondary-fixed": "#191c1e",
                    "tertiary-fixed": "#6ffbbe",
                    "on-error-container": "#93000a",
                    "secondary-container": "#dee0e2",
                    "on-tertiary-fixed-variant": "#005236",
                    "error": "#ba1a1a",
                    "primary-fixed": "#ffdcc6",
                    "surface-container-high": "#dee9fd",
                    "on-error": "#ffffff",
                    "on-background": "#121c2a",
                    "on-tertiary-container": "#53e3a7",
                    "surface-tint": "#79573f",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#eec1a4",
                    "primary-fixed-dim": "#eabda0",
                    "primary": "#553722",
                    "background": "#f9f9ff",
                    "secondary-fixed-dim": "#c5c6c8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "md": "16px",
                    "xl": "32px",
                    "container-max": "1440px",
                    "lg": "24px",
                    "sm": "8px",
                    "xs": "4px",
                    "gutter": "24px",
                    "2xl": "48px",
                    "margin-desktop": "40px"
            },
            "fontFamily": {
                    "body-md": ["Be Vietnam Pro"],
                    "label-md": ["Be Vietnam Pro"],
                    "body-lg": ["Be Vietnam Pro"],
                    "headline-md": ["Be Vietnam Pro"],
                    "body-sm": ["Be Vietnam Pro"],
                    "display-lg": ["Be Vietnam Pro"],
                    "headline-lg": ["Be Vietnam Pro"],
                    "label-sm": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        /* Base styles to ensure consistency */
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        /* Form input base styling */
        .form-input {
            width: 100%;
            border-radius: theme('borderRadius.lg');
            border-width: 1px;
            border-color: theme('colors.outline-variant');
            background-color: theme('colors.surface-container-lowest');
            padding: 12px 16px;
            color: theme('colors.on-surface');
            outline: none;
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .form-input:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }

        .form-input::placeholder {
            color: theme('colors.secondary-fixed-dim');
        }

        .form-label {
            display: block;
            margin-bottom: theme('spacing.sm');
            color: theme('colors.on-surface-variant');
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md sm:p-lg antialiased">
<!-- Main Registration Card -->
<main class="w-full max-w-2xl bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_2px_4px_rgba(0,0,0,0.04)] overflow-hidden">
<!-- Header Section -->
<header class="px-lg pt-xl pb-md text-center border-b border-surface-container">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container text-on-primary-container mb-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 24px;">storefront</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Tạo tài khoản</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tham gia không gian làm việc của cửa hàng</p>
</header>
<!-- Form Section -->
<form class="p-lg space-y-xl" onsubmit="event.preventDefault();">
<!-- Step 1: Invite Code Verification -->
<section class="space-y-md">
<div>
<label class="form-label font-label-md text-label-md" for="invite-code">Mã mời</label>
<div class="flex gap-md">
<input class="form-input font-body-md text-body-md flex-1" id="invite-code" placeholder="Nhập mã mời từ quản lý" type="text" value="CH-88291A"/>
<button class="inline-flex items-center justify-center px-lg py-[12px] bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg hover:bg-surface-container-low transition-colors whitespace-nowrap active:scale-95 duration-150" type="button">
                            Kiểm tra mã
                        </button>
</div>
</div>
<!-- Business Preview Area (Simulating successful check state) -->
<div class="flex items-start gap-md p-md bg-surface-container-low rounded-lg border-l-4 border-primary">
<div class="mt-xs text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface">Bạn đang tham gia: <span class="font-bold">The Coffee House</span></p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs flex items-center gap-xs">
<span class="material-symbols-outlined" style="font-size: 16px;">person</span>
                            Người mời: Nguyễn Văn A
                        </p>
</div>
</div>
</section>
<hr class="border-t border-outline-variant/30"/>
<!-- Step 2: Personal & Account Details -->
<section class="space-y-md">
<!-- Row 1: Full Name -->
<div>
<label class="form-label font-label-md text-label-md" for="full-name">Họ và tên</label>
<input class="form-input font-body-md text-body-md" id="full-name" placeholder="Nhập họ và tên của bạn" type="text"/>
</div>
<!-- Row 2: Email & Phone (Grid) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="form-label font-label-md text-label-md" for="email">Email</label>
<input class="form-input font-body-md text-body-md" id="email" placeholder="ví dụ@email.com" type="email"/>
</div>
<div>
<label class="form-label font-label-md text-label-md" for="phone">Số điện thoại</label>
<input class="form-input font-body-md text-body-md" id="phone" placeholder="09xx xxx xxx" type="tel"/>
</div>
</div>
<!-- Row 3: Username -->
<div>
<label class="form-label font-label-md text-label-md" for="username">Tên đăng nhập</label>
<input class="form-input font-body-md text-body-md" id="username" placeholder="Tên sử dụng để đăng nhập POS" type="text"/>
</div>
<!-- Row 4: Passwords (Grid) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="form-label font-label-md text-label-md" for="password">Mật khẩu</label>
<input class="form-input font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
<div>
<label class="form-label font-label-md text-label-md" for="confirm-password">Xác nhận mật khẩu</label>
<input class="form-input font-body-md text-body-md" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
</section>
<!-- Actions -->
<div class="pt-md space-y-md">
<button class="w-full flex items-center justify-center py-[14px] px-xl bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:bg-primary/90 transition-colors active:scale-[0.98] duration-150" type="submit">
                    Tạo tài khoản nhân viên
                </button>
<button class="w-full flex items-center justify-center py-[14px] px-xl bg-transparent text-on-surface-variant font-label-md text-label-md rounded-lg hover:bg-surface-container transition-colors active:scale-[0.98] duration-150" type="button">
                    Quay lại
                </button>
</div>
</form>
</main>
</body></html>
