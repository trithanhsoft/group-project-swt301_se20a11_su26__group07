<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Business - The Morning Brew</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                        "on-secondary-fixed-variant": "#444749",
                        "surface-container-high": "#e2e8f8",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#ebf1ff",
                        "on-surface": "#151c27",
                        "on-tertiary-fixed-variant": "#005236",
                        "primary-fixed": "#ffdcc6",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#606365",
                        "error": "#ba1a1a",
                        "surface": "#f9f9ff",
                        "tertiary-container": "#006242",
                        "on-tertiary": "#ffffff",
                        "background": "#f9f9ff",
                        "surface-tint": "#79573f",

                        "inverse-primary": "#eabda0",

                        "primary-container": "#6f4e37",
                        "on-tertiary-container": "#53e3a7",
                        "on-secondary-fixed": "#191c1e",
                        "outline-variant": "#d4c3ba",
                        "surface-container-highest": "#dce2f3",
                        "secondary-fixed-dim": "#c5c6c8",

                        "surface-bright": "#f9f9ff",
                        "on-error-container": "#93000a",
                        "secondary": "#5c5f60",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#4edea3",
                        "secondary-fixed": "#e1e2e4",
                        "on-primary-fixed": "#2d1604",
                        "inverse-surface": "#2a313d",
                        "on-primary-container": "#eec1a4",
                        "on-primary-fixed-variant": "#5f402a",
                        "secondary-container": "#dee0e2",
                        "outline": "#82746d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "lg": "24px",
                        "sm": "8px",
                        "sidebar-width": "280px",
                        "container-max": "1440px",
                        "md": "16px",
                        "unit": "4px",
                        "xs": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],

                    "fontSize": {

                        "label-md": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],

                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopAppBar Component (Minimal for creation flow) -->
<header class="bg-white dark:bg-surface-dim fixed top-0 left-0 w-full h-16 border-b border-secondary-container dark:border-outline flex justify-between items-center px-lg z-40 flat no shadows">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="storefront">storefront</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface dark:text-inverse-on-surface">The Morning Brew</span>
</div>
<div class="flex items-center gap-md">
<span class="font-label-md text-label-md text-on-surface-variant dark:text-on-secondary-fixed-variant">Quản trị viên</span>
<div class="w-8 h-8 rounded-full bg-secondary-container overflow-hidden">
<img alt="User Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCCflJM9q4fdoFF_e_8igHQZlzuh3cxCKrbuSy5JF_XUu-Yjds2Sbj2p2QgDAwd_O3Km3t7IyELk9RzA7U6aBGfHN2Quhv1vUVY89EQzsTlPAEM63Q4CIjX1M9qqSDRkErLeRFfZ-uLlk-e-XtBdICOovF1tQkTKWR4gI5S2fruQKwNftctEz3rZIcAJdbgxKSWLh_1SSoejrwY-nIvmutzqnBIw9p8IV5nvm_nEuieLLREZ_D6kmBvSWNy1LAWI3gzL_wzMEjI2s"/>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-16 flex items-center justify-center p-md sm:p-lg">
<!-- Form Container -->
<div class="w-full max-w-[600px] bg-white rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-secondary-container p-lg sm:p-xl">
<div class="mb-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Tạo doanh nghiệp mới</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Thiết lập hồ sơ quán cà phê của bạn để bắt đầu quản lý.</p>
</div>
<!-- Validation Message Area (Hidden by default, shown for demonstration) -->
<div class="hidden bg-error-container text-on-error-container p-md rounded-lg mb-lg flex items-start gap-sm">
<span class="material-symbols-outlined" data-icon="error">error</span>
<div class="font-body-md text-body-md">
                    Vui lòng điền đầy đủ các trường bắt buộc.
                </div>
</div>
<form class="space-y-lg">
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Tên doanh nghiệp -->
<div class="flex flex-col gap-xs col-span-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="businessName">Tên doanh nghiệp <span class="text-error">*</span></label>
<input class="w-full h-10 px-md rounded-DEFAULT border border-[#D1D5DB] bg-white text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="businessName" name="businessName" placeholder="VD: The Morning Brew" type="text"/>
</div>
<!-- Loại hình -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="businessType">Loại hình</label>
<div class="relative">
<select class="w-full h-10 px-md rounded-DEFAULT border border-[#D1D5DB] bg-white text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none transition-colors pr-10" id="businessType" name="businessType">
<option value="cafe">Quán Cà Phê</option>
<option value="restaurant">Nhà Hàng</option>
<option value="bakery">Tiệm Bánh</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Tiền tệ -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="currency">Tiền tệ</label>
<div class="relative">
<select class="w-full h-10 px-md rounded-DEFAULT border border-[#D1D5DB] bg-white text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none appearance-none transition-colors pr-10" disabled="" id="currency" name="currency">
<option value="VND">VND (Việt Nam Đồng)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant opacity-50" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Số điện thoại -->
<div class="flex flex-col gap-xs col-span-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="phone">Số điện thoại</label>
<input class="w-full h-10 px-md rounded-DEFAULT border border-[#D1D5DB] bg-white text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="phone" name="phone" placeholder="VD: 0912 345 678" type="tel"/>
</div>
<!-- Địa chỉ -->
<div class="flex flex-col gap-xs col-span-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="address">Địa chỉ</label>
<input class="w-full h-10 px-md rounded-DEFAULT border border-[#D1D5DB] bg-white text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="address" name="address" placeholder="Nhập địa chỉ đầy đủ" type="text"/>
</div>
<!-- Mô tả -->
<div class="flex flex-col gap-xs col-span-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="description">Mô tả</label>
<textarea class="w-full p-md rounded-DEFAULT border border-[#D1D5DB] bg-white text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors resize-none" id="description" name="description" placeholder="Mô tả ngắn gọn về doanh nghiệp của bạn..." rows="3"></textarea>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-end gap-md pt-md border-t border-secondary-container mt-xl">
<button class="px-lg h-10 rounded-DEFAULT border border-[#E5E7EB] bg-white text-[#374151] font-label-md text-label-md hover:bg-surface-container transition-colors" type="button">
                        Hủy
                    </button>
<button class="px-lg h-10 rounded-DEFAULT bg-[#6F4E37] text-white font-label-md text-label-md hover:bg-[#5f402a] transition-colors flex items-center gap-xs" type="submit">
<span class="material-symbols-outlined text-[18px]" data-icon="add_business">add_business</span>
                        Tạo doanh nghiệp
                    </button>
</div>
</form>
</div>
</main>
</body></html>
